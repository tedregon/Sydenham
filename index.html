<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Timer</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Sydenham">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        body {
            font-family: monospace, sans-serif;
            font-size: 14px;
            margin: 20px;
            color: orange;
            background-color: #272727;
        }
        h4 {
            margin: 10px 0;
        }
        .departure {
            padding: 10px 0;
            border-bottom: 1px solid #444444;
        }
        .error {
            color: red;
            text-align: center;
        }
    </style>
<script defer data-domain="sydenham-station.tiiny.site" src="https://analytics.tiiny.site/js/plausible.js"></script><script defer data-domain="sydenham-station.tiiny.site" src="https://analytics.tiiny.site/js/plausible.js"></script></head>
<body style="max-width: 100%; margin: 0 auto; padding: 0 20px;">
    <h3 style="width:100%; text-align: center;">Sydenham Station</h3>
    <div id="departures">Loading...</div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        const departuresContainer = document.getElementById('departures');

        async function fetchDepartures() {
            try {
                const response = await fetch('https://api.tfl.gov.uk/StopPoint/910GSYDENHM/Arrivals?lineId=windrush');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                displayDepartures(data);
            } catch (error) {
                departuresContainer.innerHTML = `<p class="error">Error fetching departure data. Please try again later.</p>`;
            }
        }

        function displayDepartures(departures) {
            const inboundTrains = departures.filter(departure => 
                departure.direction && departure.direction.toLowerCase() === 'inbound'
            );

            if (inboundTrains.length === 0) {
                departuresContainer.innerHTML = '<p>No inbound trains.</p>';
                return;
            }

            inboundTrains.sort((a, b) => new Date(a.expectedArrival) - new Date(b.expectedArrival));

            const departureList = inboundTrains.map(departure => {
                const destination = departure.destinationName;
                const platform = departure.platformName || 'N/A';
                const timeLeft = getTimeLeft(new Date(departure.expectedArrival));
                
                return `<div class="departure" style="width: 320px; height: 16px; text-align: left;">
                            <div style="width: 64px; display:inline-block; color: #ffffff; float:left;position: relative; white-space: nowrap;"> ${timeLeft}</div> 
                            <div style="max-width: 256px; display:inline-block;float:left; text-overflow: ellipsis; overflow: hidden;position: relative; white-space: nowrap;">${destination}</div>                            
                        </div>`;
            }).join('');

            departuresContainer.innerHTML = departureList;
        }

        function getTimeLeft(departureTime) {
            const now = new Date();
            const diffMs = departureTime - now;
            const diffMin = Math.floor(diffMs / 60000);

            if (diffMin <= 0) return "Due";
            return `${diffMin} min`;
        }

        fetchDepartures();
        setInterval(fetchDepartures, 60000); // Refresh every 60 seconds
    </script>
</body>
</html>
